# ============================================================================
# Logstash Pipeline — 交通数据治理平台日志处理
#
# 输入:  接收来自各服务的日志 (Beats / TCP / HTTP)
# 过滤:  解析、结构化、丰富日志
# 输出:  写入 Elasticsearch
# ============================================================================

# ---------- TCP 输入（Flink / Kafka / Hive 日志）----------
input {
  tcp {
    port => 5000
    codec => json_lines
    tags => ["traffic", "json"]
  }
  tcp {
    port => 5001
    codec => line
    tags => ["traffic", "plain"]
  }
}

# ---------- 过滤器 ----------
filter {
  # JSON 格式日志
  if "json" in [tags] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # 添加通用字段
  mutate {
    add_field => {
      "platform" => "traffic-governance"
      "environment" => "production"
    }
  }

  # 解析 Flink 日志
  if [service] == "flink" or [container] =~ /flink/ {
    mutate {
      add_field => { "component" => "flink" }
    }
    # 提取 Flink 作业名
    grok {
      match => { "message" => "%{GREEDYDATA:flink_job_name} %{LOGLEVEL:log_level} %{GREEDYDATA:flink_message}" }
      tag_on_failure => ["_grok_flink_failed"]
    }
  }

  # 解析 Kafka 日志
  if [service] == "kafka" or [container] =~ /kafka/ {
    mutate {
      add_field => { "component" => "kafka" }
    }
  }

  # 解析 Hive 日志
  if [service] == "hive" or [container] =~ /hive/ {
    mutate {
      add_field => { "component" => "hive" }
    }
  }

  # 提取时间戳
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # 移除敏感信息
  mutate {
    remove_field => ["password", "token", "secret"]
  }
}

# ---------- 输出到 Elasticsearch ----------
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "traffic-logs-%{+YYYY.MM.dd}"
    ecs_compatibility => disabled
    manage_template => false
  }

  # 同时输出到 stdout（调试用）
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
