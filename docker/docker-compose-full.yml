# ============================================================================
# docker-compose-full.yml
# 城市交通大数据平台 — 全服务生产级编排
# 包含: Kafka (KRaft) / Flink / Redis / MySQL / 业务应用
# 启动: docker-compose -f docker/docker-compose-full.yml up -d
# ============================================================================

version: "3.9"

# ============================================================================
# 网络
# ============================================================================
networks:
  traffic-net:
    driver: bridge
    name: traffic-net
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================================
# 数据卷 (持久化)
# ============================================================================
volumes:
  # Kafka 数据卷 — 消息持久化
  kafka-data:
    driver: local
  # MySQL 数据卷 — 业务数据库持久化
  mysql-data:
    driver: local
  # Redis 数据卷 — 缓存持久化 (AOF/RDB)
  redis-data:
    driver: local
  # Flink checkpoint 数据卷 — 容错恢复
  flink-checkpoints:
    driver: local

# ============================================================================
# 服务清单
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # 1. Kafka — 消息队列 (KRaft 模式, 无需 ZooKeeper)
  #    端口: 9092 (PLAINTEXT), 9093 (Controller)
  #    自动创建 4 个 Topic: traffic-logs, vehicle-events, device-status, alarm-logs
  # --------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7
    container_name: traffic-kafka
    hostname: kafka
    ports:
      - "9092:9092"        # 客户端连接 (PLAINTEXT)
      - "9093:9093"        # Controller 内部通信
    environment:
      # KRaft 模式配置 — 不依赖 ZooKeeper
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # 自动创建 Topic
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=4
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Kafka Topic 初始化 — 等待 Kafka 就绪后创建 4 个业务 Topic
  # --------------------------------------------------------------------------
  kafka-init:
    image: bitnami/kafka:3.7
    container_name: traffic-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
        echo '⏳ 等待 Kafka 完全就绪...' &&
        sleep 5 &&
        echo '📬 创建 Topic: traffic-logs' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic traffic-logs       --partitions 4 --replication-factor 1 &&
        echo '📬 创建 Topic: vehicle-events' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic vehicle-events    --partitions 4 --replication-factor 1 &&
        echo '📬 创建 Topic: device-status' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic device-status     --partitions 4 --replication-factor 1 &&
        echo '📬 创建 Topic: alarm-logs' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic alarm-logs        --partitions 4 --replication-factor 1 &&
        echo '✅ 全部 Topic 创建完成' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --list
      "
    networks:
      - traffic-net

  # --------------------------------------------------------------------------
  # 2. Flink JobManager — 流计算调度节点
  #    端口: 8081 (Web UI)
  # --------------------------------------------------------------------------
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: traffic-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"        # Flink Web Dashboard
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    command: jobmanager
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # 3. Flink TaskManager — 流计算执行节点
  #    2 个 Slot，可并行执行 2 个 Task
  # --------------------------------------------------------------------------
  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: traffic-flink-taskmanager
    hostname: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=2
    command: taskmanager
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://flink-jobmanager:8081/taskmanagers"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # 4. Redis — 缓存 / 实时计数 / 设备状态
  #    端口: 6379
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: traffic-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # 5. MySQL — 业务数据库
  #    端口: 3306, 数据库: traffic_biz, 用户: traffic / traffic123
  # --------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: traffic-mysql
    hostname: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=traffic_biz
      - MYSQL_USER=traffic
      - MYSQL_PASSWORD=traffic123
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "traffic", "-ptraffic123"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 40s

  # --------------------------------------------------------------------------
  # 6. 业务应用 (app) — Spring Boot / 流量监控主服务
  #    端口: 8088
  #    依赖: Kafka / Flink / Redis / MySQL 全部就绪后启动
  # --------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: Dockerfile.app
    container_name: traffic-app
    hostname: app
    ports:
      - "8088:8088"
    environment:
      # 服务发现地址 (容器内网络)
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FLINK_REST_URL=http://flink-jobmanager:8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=traffic_biz
      - MYSQL_USER=traffic
      - MYSQL_PASSWORD=traffic123
      # JVM 参数
      - JAVA_OPTS=-Xms512m -Xmx1024m
    depends_on:
      kafka:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
