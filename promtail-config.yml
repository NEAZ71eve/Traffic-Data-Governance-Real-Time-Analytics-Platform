# Promtail 日志采集配置 — 采集 Docker 容器日志并发送到 Loki
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://traffic-loki:3100/loki/api/v1/push

scrape_configs:
  # 采集所有 Docker 容器日志
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 只采集 traffic- 开头的容器
      - source_labels: ['__meta_docker_container_name']
        regex: 'traffic-(.*)'
        action: keep
      # 使用容器名作为标签
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      # 提取服务名
      - source_labels: ['__meta_docker_container_name']
        regex: 'traffic-(.*)-[0-9]+'
        target_label: 'service'
      - source_labels: ['__meta_docker_container_name']
        regex: 'traffic-(.*)'
        target_label: 'service'
      # 移除不需要的标签
      - action: labelmap
        regex: __meta_docker_container_label_(.+)  # 修正: 去除末尾的星号使其有效

  # 系统日志（如果有）
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log

  # Flink 日志专用
  - job_name: flink-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: flink
          __path__: /tmp/flink/log/*.log
