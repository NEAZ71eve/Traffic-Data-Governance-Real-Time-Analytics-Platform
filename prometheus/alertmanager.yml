# AlertManager 配置 — 告警路由与通知
global:
  resolve_timeout: 5m

# 路由树
route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
      group_wait: 5s
      repeat_interval: 5m

    - match:
        severity: major
      receiver: 'major-alerts'
      repeat_interval: 15m

    - match:
        severity: warning
      receiver: 'warning-alerts'

# 接收器
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://traffic-app:8088/api/health'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://alertmanager-adapter:5000/alertmanager/dingtalk'
        send_resolved: true
        max_alerts: 1
      # 开发模式备选: 直接连 webhook 模拟器
      # - url: 'http://localhost:9999/dingtalk'

  - name: 'major-alerts'
    webhook_configs:
      - url: 'http://alertmanager-adapter:5000/alertmanager/dingtalk'
        send_resolved: true

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://alertmanager-adapter:5000/alertmanager/dingtalk'
        send_resolved: false

# 抑制规则
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
