# ============================================
# Flume Agent: 路况监测日志 -> Kafka traffic_status
# 数据源：模拟日志文件 /data/logs/traffic_status.log
# Sink：Kafka Topic traffic_status
# ============================================

agent.sources = s1
agent.channels = c1
agent.sinks = k1

# --------- 数据源：TailDir ----------
agent.sources.s1.type = taildir
agent.sources.s1.filegroups = f1
agent.sources.s1.filegroups.f1 = /data/logs/traffic/traffic_status.log
agent.sources.s1.positionFile = /data/flume/taildir_position_status.json
agent.sources.s1.batchSize = 3000
agent.sources.s1.channels = c1

agent.sources.s1.interceptors = i1
agent.sources.s1.interceptors.i1.type = timestamp
agent.sources.s1.interceptors.i1.headerName = collect_time

# --------- Channel ----------
agent.channels.c1.type = file
agent.channels.c1.checkpointDir = /data/flume/checkpoint/status
agent.channels.c1.dataDirs = /data/flume/data/status
agent.channels.c1.capacity = 500000
agent.channels.c1.transactionCapacity = 3000

# --------- Sink：Kafka ----------
agent.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.k1.kafka.bootstrap.servers = kafka-node1:9092,kafka-node2:9092,kafka-node3:9092
agent.sinks.k1.kafka.topic = traffic_status
agent.sinks.k1.kafka.producer.acks = 1
agent.sinks.k1.kafka.producer.compression.type = snappy
agent.sinks.k1.kafka.producer.batch.size = 16384
agent.sinks.k1.kafka.producer.linger.ms = 5
agent.sinks.k1.channel = c1
