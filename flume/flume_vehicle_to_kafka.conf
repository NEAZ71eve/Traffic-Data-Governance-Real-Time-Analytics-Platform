# ============================================
# Flume Agent: 车辆通行日志 -> Kafka traffic_vehicle
# 数据源：模拟日志文件 /data/logs/vehicle_pass.log
# Sink：Kafka Topic traffic_vehicle
# Channel：内存 + 文件双通道容错
# ============================================

agent.sources = s1
agent.channels = c1
agent.sinks = k1

# --------- 数据源：TailDir（支持断点续传）---------
agent.sources.s1.type = taildir
agent.sources.s1.filegroups = f1
agent.sources.s1.filegroups.f1 = /data/logs/traffic/vehicle_pass.log
agent.sources.s1.positionFile = /data/flume/taildir_position_vehicle.json
agent.sources.s1.batchSize = 5000
agent.sources.s1.channels = c1

# 自定义拦截器：添加分区日期标记
agent.sources.s1.interceptors = i1
agent.sources.s1.interceptors.i1.type = timestamp
agent.sources.s1.interceptors.i1.headerName = collect_time

# --------- Channel：文件通道（不丢数据）----------
agent.channels.c1.type = file
agent.channels.c1.checkpointDir = /data/flume/checkpoint/vehicle
agent.channels.c1.dataDirs = /data/flume/data/vehicle
agent.channels.c1.capacity = 1000000
agent.channels.c1.transactionCapacity = 5000
agent.channels.c1.keep-alive = 3

# --------- Sink：Kafka ----------
agent.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.k1.kafka.bootstrap.servers = kafka-node1:9092,kafka-node2:9092,kafka-node3:9092
agent.sinks.k1.kafka.topic = traffic_vehicle
agent.sinks.k1.kafka.producer.acks = 1
agent.sinks.k1.kafka.producer.compression.type = snappy
agent.sinks.k1.kafka.producer.batch.size = 16384
agent.sinks.k1.kafka.producer.linger.ms = 5
agent.sinks.k1.kafka.producer.max.request.size = 1048576
agent.sinks.k1.channel = c1
