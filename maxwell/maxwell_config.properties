# ============================================
# Maxwell CDC 配置
# 采集 MySQL traffic_business 库的 Binlog 变更
# 输出到 Kafka，供 DIM 拉链表增量更新
# ============================================

# ---- MySQL 连接 ----
host=10.0.1.100
port=3306
user=maxwell_cdc
password=${MYSQL_MAXWELL_PASSWORD}
schema_database=traffic_business

# ---- Binlog 读取 ----
# 首次执行时从最新 binlog 开始
# 历史数据回溯时改为：init_position=MYSQL_MASTER:mysql-bin.000001:4
client_id=maxwell-traffic-cdc
replica_server_id=6379
gtid_mode=true

# ---- 输出到 Kafka ----
producer=kafka
kafka.bootstrap.servers=kafka-node1:9092,kafka-node2:9092,kafka-node3:9092
kafka_topic=maxwell_traffic_cdc
kafka.compression.type=snappy
kafka.retries=3
kafka.acks=1
kafka.batch.size=16384

# ---- 过滤规则 ----
# 只采集以下表的变更
filter=include: traffic_business.t_device, traffic_business.t_road, traffic_business.t_area, traffic_business.t_device_repair, traffic_business.t_config, traffic_business.t_alarm

# 排除 DELETE 操作（拉链表不需要删除，用 end_time 闭合）
# exclude_columns 按需配置

# ---- 监控 ----
metrics.enabled=true
metrics.type=http
metrics.port=8081

# ---- 调试 ----
log_level=INFO
