# ============================================================
# 智慧城市交通数据治理 — ELK 日志收集栈
#
# 包含:
#   - Elasticsearch (日志存储与搜索)
#   - Logstash (日志处理管道)
#   - Kibana (日志可视化)
#
# 用法:
#   docker compose -f docker-compose-elk.yml up -d
#
# 访问:
#   Kibana: http://localhost:5601
#   Elasticsearch: http://localhost:9200
#
# 注意: 需要至少 4GB 内存用于 Elasticsearch
# ============================================================
services:
  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: traffic-elasticsearch
    environment:
      - node.name=es01
      - cluster.name=traffic-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - traffic-elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ==================== Logstash ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: traffic-logstash
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP input
      - "9600:9600"   # Monitoring API
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - traffic-elk-net

  # ==================== Kibana ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: traffic-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - traffic-elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  elasticsearch_data:

networks:
  traffic-elk-net:
    driver: bridge
